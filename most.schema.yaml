schema:
  schema_id: most
  name: Мост
  version: "20260226"
  author:
    - suif4599
  description: |
    俄语前缀码输入方案

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - lua_translator@*most_translator
    - punct_translator
  filters:
    - uniquifier

speller:
  alphabet: "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ-.'"
  delimiter: " '"

translator:
  dictionary: most_russian

most_russian:
  dictionary: most_russian
  enable_completion: true
  enable_sentence: false
  enable_encoder: false
  enable_user_dict: false