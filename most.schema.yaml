schema:
  schema_id: most
  name: Мост
  version: "20260226"
  author:
    - suif4599
  description: 俄语前缀码输入方案
  dependencies:
    - most_ru_zh_1
    - most_ru_zh_2
    - most_ru_zh
    - most_ru_zh_full

most:
  topk: 49

engine:
  processors:
    # - lua_processor@*switch_processor
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - table_translator@most_ru_zh_1
    - table_translator@most_ru_zh_2
    - table_translator@most_ru_zh
    - table_translator@most_ru_zh_full
    - lua_translator@*most_translator
    - punct_translator
  filters:
    - uniquifier

speller:
  alphabet: "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ.'"

most_ru_zh_1:
  tag: most_ru_zh_1_tag
  dictionary: most_ru_zh_1
  enable_completion: true
  enable_sentence: false
  enable_encoder: false
  enable_user_dict: false

most_ru_zh_2:
  tag: most_ru_zh_2_tag
  dictionary: most_ru_zh_2
  enable_completion: true
  enable_sentence: false
  enable_encoder: false
  enable_user_dict: false

most_ru_zh:
  tag: most_ru_zh_tag
  dictionary: most_ru_zh
  enable_completion: true
  enable_sentence: false
  enable_encoder: false
  enable_user_dict: false

most_ru_zh_full:
  tag: most_ru_zh_full_tag
  dictionary: most_ru_zh_full
  enable_completion: true
  enable_sentence: false
  enable_encoder: false
  enable_user_dict: false

key_binder:
  import_preset: default
